<!DOCTYPE html>
<html>
<head>
    <title>Map Test</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3P5e8Ucw0wV5Nq8kbvlvkLHzyfpwtQD0&libraries=places"></script>
    <script>
        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: -34.397, lng: 150.644},
                zoom: 8
            });
            window.mapLoaded = true;
        }
    </script>
</head>
<body onload="initMap()">
    <div id="map" style="height: 400px; width: 100%;"></div>
</body>
</html>
